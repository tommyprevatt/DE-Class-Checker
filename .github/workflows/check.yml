name: Check South HS classes

on:
  schedule:
    # Every 10 min, 10:00-23:59 UTC, which is 6 AM - 7:59 PM EDT (UTC-4).
    # When DST ends (early Nov), this effectively becomes 5 AM - 6:59 PM EST.
    # Revisit and bump to '11-23' + '0' if you want to hold the 6 AM start year-round.
    # GitHub cron can lag a few minutes under load.
    - cron: '*/10 10-23 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "Update state [skip ci]"
            git push
          fi

      - name: Notify ntfy on failure
        if: failure()
        run: |
          curl -sS \
            -H "Title: South HS watcher FAILED" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -H "Click: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Run ${{ github.run_id }} failed. Tap to view logs." \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}
